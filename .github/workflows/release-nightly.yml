name: Release Nightly

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    # 03:00 Asia/Shanghai daily
    - cron: '0 19 * * *'

permissions:
  contents: write

concurrency:
  group: release-nightly
  cancel-in-progress: true

jobs:
  prepare-nightly:
    runs-on: ubuntu-latest
    outputs:
      nightly_date: ${{ steps.meta.outputs.nightly_date }}
      version: ${{ steps.meta.outputs.version }}
      build: ${{ steps.meta.outputs.build }}
      version_code: ${{ steps.meta.outputs.version_code }}
      tag: ${{ steps.meta.outputs.tag }}
      title: ${{ steps.meta.outputs.title }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute nightly metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          MAJOR=$(python3 -c "import json; print(json.load(open('version.json'))['major'])")
          MINOR=$(python3 -c "import json; print(json.load(open('version.json'))['minor'])")
          NIGHTLY_DATE=$(TZ=Asia/Shanghai date +%F)
          BUILD=$(TZ=Asia/Shanghai date +%y%m%d)
          VERSION="${MAJOR}.${MINOR}.${BUILD}-nightly"
          VERSION_CODE=$((MAJOR * 10000000 + MINOR * 1000000 + BUILD))
          TAG="nightly-${NIGHTLY_DATE}"
          TITLE="MyClaudia Nightly ${NIGHTLY_DATE}"

          echo "nightly_date=$NIGHTLY_DATE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Create nightly prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          NIGHTLY_DATE: ${{ steps.meta.outputs.nightly_date }}
          VERSION: ${{ steps.meta.outputs.version }}
          TAG: ${{ steps.meta.outputs.tag }}
          TITLE: ${{ steps.meta.outputs.title }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Reusing existing nightly release: $TAG"
          else
            gh release create "$TAG" \
              --title "$TITLE" \
              --notes "Automated nightly build for ${NIGHTLY_DATE} (${VERSION})." \
              --prerelease
          fi

      - name: Clean old nightly prereleases
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          OLD_NIGHTLIES=$(gh release list --json tagName,isPrerelease \
            --jq '[.[] | select(.isPrerelease and (.tagName | startswith("nightly-")))] | sort_by(.tagName) | reverse | .[14:] | .[].tagName')
          if [ -z "$OLD_NIGHTLIES" ]; then
            exit 0
          fi

          echo "$OLD_NIGHTLIES" | while read -r tag; do
            [ -n "$tag" ] || continue
            gh release delete "$tag" --cleanup-tag --yes
          done

  build-macos:
    needs: prepare-nightly
    runs-on: macos-14
    timeout-minutes: 90
    env:
      CI: true
      GH_TOKEN: ${{ github.token }}
      RELEASE_REMOTE: origin
      RELEASE: 1
      RELEASE_CREATE_IF_MISSING: 0
      RELEASE_VERSION: ${{ needs.prepare-nightly.outputs.version }}
      RELEASE_BUILD: ${{ needs.prepare-nightly.outputs.build }}
      RELEASE_VERSION_CODE: ${{ needs.prepare-nightly.outputs.version_code }}
      RELEASE_TAG: ${{ needs.prepare-nightly.outputs.tag }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
      SKIP_SIGNING: ${{ secrets.MACOS_CERT_P12_BASE64 == '' && '1' || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Install updater signing key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.tauri"
          printf '%s' '${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}' > "$HOME/.tauri/my-claudia.key"
          chmod 600 "$HOME/.tauri/my-claudia.key"
          if [ -n "${{ secrets.TAURI_SIGNING_PUBLIC_KEY || '' }}" ]; then
            printf '%s' '${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}' > "$HOME/.tauri/my-claudia.key.pub"
            chmod 644 "$HOME/.tauri/my-claudia.key.pub"
          fi
          echo "TAURI_SIGNING_PRIVATE_KEY_PATH=$HOME/.tauri/my-claudia.key" >> "$GITHUB_ENV"

      - name: Import macOS signing certificate
        if: env.MACOS_CERT_P12_BASE64 != ''
        shell: bash
        env:
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/macos-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          printf '%s' "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build and upload macOS nightly assets
        shell: bash
        run: ./scripts/build/macos.sh

  build-linux:
    needs: prepare-nightly
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CI: true
      GH_TOKEN: ${{ github.token }}
      RELEASE_REMOTE: origin
      RELEASE_VERSION: ${{ needs.prepare-nightly.outputs.version }}
      RELEASE_BUILD: ${{ needs.prepare-nightly.outputs.build }}
      RELEASE_VERSION_CODE: ${{ needs.prepare-nightly.outputs.version_code }}
      TAG: ${{ needs.prepare-nightly.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Linux system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Build Linux packages
        shell: bash
        run: ./scripts/build/linux.sh

      - name: Upload Linux artifacts to nightly release
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb \
            apps/desktop/src-tauri/target/release/bundle/rpm/*.rpm \
            --clobber

  build-wsl-server:
    needs: prepare-nightly
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CI: true
      RELEASE_VERSION: ${{ needs.prepare-nightly.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build server bundle (Linux x64)
        shell: bash
        run: |
          set -euo pipefail
          export APP_VERSION="$RELEASE_VERSION"
          pnpm -r run build
          pnpm --filter @my-claudia/server run bundle

          NODE_BIN=$(ls apps/desktop/src-tauri/binaries/node-*-unknown-linux-gnu 2>/dev/null | head -n1)
          if [ -n "$NODE_BIN" ]; then
            cp "$NODE_BIN" server/bundle/node
            chmod +x server/bundle/node
          else
            echo "ERROR: Linux node sidecar binary not found"
            exit 1
          fi

          echo "$RELEASE_VERSION" > server/bundle/.version

      - name: Upload WSL server bundle
        uses: actions/upload-artifact@v6
        with:
          name: nightly-wsl-server-bundle
          path: server/bundle/
          retention-days: 1

  build-windows:
    needs: [prepare-nightly, build-wsl-server]
    runs-on: windows-2022
    timeout-minutes: 60
    env:
      CI: true
      GH_TOKEN: ${{ github.token }}
      RELEASE_VERSION: ${{ needs.prepare-nightly.outputs.version }}
      RELEASE_BUILD: ${{ needs.prepare-nightly.outputs.build }}
      TAG: ${{ needs.prepare-nightly.outputs.tag }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        shell: pwsh
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Download WSL server bundle
        uses: actions/download-artifact@v8
        with:
          name: nightly-wsl-server-bundle
          path: apps/desktop/src-tauri/wsl-server

      - name: Build Windows installers
        shell: pwsh
        run: .\scripts\build\windows.ps1

      - name: Upload Windows artifacts to nightly release
        shell: pwsh
        run: |
          gh release upload $env:TAG `
            --repo $env:GITHUB_REPOSITORY `
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi `
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe `
            --clobber

  build-android:
    needs: prepare-nightly
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      CI: true
      GH_TOKEN: ${{ github.token }}
      RELEASE_REMOTE: origin
      RELEASE: 1
      RELEASE_CREATE_IF_MISSING: 0
      RELEASE_VERSION: ${{ needs.prepare-nightly.outputs.version }}
      RELEASE_BUILD: ${{ needs.prepare-nightly.outputs.build }}
      RELEASE_VERSION_CODE: ${{ needs.prepare-nightly.outputs.version_code }}
      RELEASE_TAG: ${{ needs.prepare-nightly.outputs.tag }}
      KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euo pipefail
          yes 2>/dev/null | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            "ndk;27.0.12077973"

      - name: Install Android signing keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.android"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$HOME/.android/my-claudia-release.keystore"
          chmod 600 "$HOME/.android/my-claudia-release.keystore"

      - name: Build and upload Android nightly assets
        shell: bash
        run: ./scripts/build/android.sh
