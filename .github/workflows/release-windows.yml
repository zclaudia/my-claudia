name: Release Windows

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-windows
  cancel-in-progress: true

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build: ${{ steps.version.outputs.build }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ] && [[ "${GITHUB_REF_NAME:-}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            BUILD="$(echo "$VERSION" | cut -d. -f3)"
            TAG="$GITHUB_REF_NAME"
          else
            eval "$(./scripts/release/version-bump.sh --platform windows --bump)"
            TAG="v${VERSION}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Prepared release: $TAG"

      # Release is created by release-all-platforms workflow
      # This workflow only builds and uploads to an existing release

  build-windows:
    needs: prepare-release
    runs-on: windows-2022
    timeout-minutes: 60
    env:
      CI: true
      GH_TOKEN: ${{ github.token }}
      RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
      RELEASE_BUILD: ${{ needs.prepare-release.outputs.build }}
      TAG: ${{ needs.prepare-release.outputs.tag }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        shell: pwsh
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Build Windows installers
        shell: pwsh
        run: .\scripts\build\windows.ps1

      - name: Upload Windows artifacts to release
        shell: pwsh
        run: |
          gh release upload $env:TAG `
            --repo $env:GITHUB_REPOSITORY `
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi `
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe `
            --clobber
